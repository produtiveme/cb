<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhe do Estoque - Gestão de Cotação</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Estilo Global Centralizado -->
  <link rel="stylesheet" href="style.css">

</head>
<body>

  <div class="flex flex-col md:flex-row min-h-screen">
    
    <!-- Sidebar (será preenchida pelo app.js) -->
    <div id="sidebar-container"></div>

    <!-- Conteúdo Principal -->
    <main class="flex-1 p-6 md:p-10">

      <!-- Cabeçalho (será preenchido pelo app.js) -->
      <header id="header-container"></header>

      <!-- Container para Alertas -->
      <div id="error-container" class="fixed top-5 right-5 z-50 w-full max-w-sm"></div>
      
      <!-- Container do Modal (inicialmente oculto) -->
      <div id="modal-container" class="hidden"></div>

      <!-- Conteúdo da Página (será preenchido pelo JS) -->
      <div id="detail-content-container">
        <!-- O Spinner de carregamento ou os cards serão injetados aqui -->
      </div>
      
    </main>
  </div>

  <!-- Rodapé (será preenchido pelo app.js) -->
  <div id="footer-container"></div>


  <!-- Script da Página -->
  <script type="module">
    import {
      checkAuth,
      getAppData,
      renderSidebarNav,
      renderFooter,
      renderLoading,
      renderScreenHeader,
      showError,
      getUrlParam,
      getProductById,
      formatDate,
      COLORS
    } from './app.js';

    // --- Estado da Página ---
    const pageState = {
      appData: null,
      productId: null,
      product: null,
      productHistory: []
    };
    
    // --- Funções Principais ---

    /**
     * Inicializa a página
     */
    function init() {
      // 1. Verifica autenticação
      if (!checkAuth()) return;

      // 2. Carrega dados do localStorage
      pageState.appData = getAppData();
      if (!pageState.appData) {
        showError("Falha ao carregar dados. Tente fazer login novamente.");
        return;
      }
      
      // 3. Pega o ID do produto da URL
      pageState.productId = getUrlParam('id');
      if (!pageState.productId) {
        showError("ID do produto não fornecido.");
        renderPageError("Produto não encontrado.");
        return;
      }
      
      // 4. Encontra o produto
      pageState.product = getProductById(pageState.productId);
      if (!pageState.product) {
        showError("Produto não encontrado.");
        renderPageError(`Produto com ID ${pageState.productId} não foi encontrado.`);
        return;
      }
      
      // 5. Filtra o histórico para este produto (apenas Entradas)
      pageState.productHistory = pageState.appData.stockHistory
        .filter(item => item.property_produto && item.property_produto.includes(pageState.productId))
        .filter(item => item.property_movimento === 'Entrada')
        .sort((a, b) => new Date(b.property_criado_em) - new Date(a.property_criado_em)); // Ordena do mais novo para o mais antigo

      // 6. Renderiza componentes estáticos
      renderSidebarNav('estoque'); // Mantém 'Estoque' como ativo
      renderFooter();
      
      // 7. Renderiza a tela de detalhes
      renderEstoqueDetailScreen();
    }
    
    /**
     * Renderiza o layout principal da tela de detalhes
     */
    function renderEstoqueDetailScreen() {
      const { product } = pageState;
      const container = document.getElementById('detail-content-container');
      if (!container) return;
      
      // Botões do Cabeçalho
      const headerButtons = `
        <div class="flex items-center space-x-2">
          <a 
            href="estoque.html" 
            class="px-4 py-2 bg-gray-200 text-gray-800 rounded-md font-medium hover:bg-gray-300 transition text-sm"
          >
            &larr; Voltar
          </a>
          <a 
            href="${product.url}" 
            target="_blank" 
            class="px-4 py-2 text-white rounded-md font-medium transition text-sm"
            style="background-color: ${COLORS.blue};"
            title="Abrir o registo original no Notion"
          >
            Abrir no Notion
          </a>
        </div>
      `;
      
      // Renderiza Cabeçalho
      renderScreenHeader(
        `Histórico: ${product.property_nome}`, 
        `ID: ${product.id}`, 
        headerButtons
      );
      
      // Renderiza Conteúdo
      container.innerHTML = `
        <div class="space-y-6">
          ${renderProductInfoCard()}
          ${renderInwardMovementsTableCard()}
        </div>
      `;
    }
    
    /**
     * Renderiza o card de Informações do Produto
     */
    function renderProductInfoCard() {
      const { product } = pageState;
      
      const status = product.property_situa_o_do_produto || 'Indefinido';
      const statusBadge = status === 'Ativo'
        ? `<span class="px-3 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800">${status}</span>`
        : `<span class="px-3 py-1 text-xs font-semibold rounded-full bg-gray-100 text-gray-800">${status}</span>`;

      return `
        <div class="bg-white p-6 rounded-lg shadow border border-gray-200">
          <h3 class="text-lg font-bold font-heading mb-4" style="color: ${COLORS.black};">Detalhes do Produto</h3>
          
          <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <!-- Descrição -->
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-gray-500">Descrição</label>
              <p class="mt-1 text-base text-gray-900">${product.property_descri_o_do_produto || 'N/A'}</p>
            </div>
            
            <!-- Situação -->
            <div>
              <label class="block text-sm font-medium text-gray-500">Situação</label>
              <div class="mt-1">
                ${statusBadge}
              </div>
            </div>
            
            <!-- Categoria -->
            <div>
              <label class="block text-sm font-medium text-gray-500">Categoria</label>
              <p class="mt-1 text-base text-gray-900">${(product.property_categoria && product.property_categoria[0]) || 'N/A'}</p>
            </div>
            
            <!-- Unidade de Medida -->
            <div>
              <label class="block text-sm font-medium text-gray-500">Unidade de Medida</label>
              <p class="mt-1 text-base text-gray-900">${product.property_unidade_de_medida || 'N/A'}</p>
            </div>
          </div>
        </div>
      `;
    }
    
    /**
     * Renderiza o card da Tabela de Entradas
     */
    function renderInwardMovementsTableCard() {
      const { productHistory } = pageState;
      
      if (productHistory.length === 0) {
        return `
          <div class="bg-white p-6 rounded-lg shadow border text-center text-gray-500">
            Nenhuma entrada de estoque encontrada para este produto.
          </div>
        `;
      }
      
      const formatCurrency = (val) => val != null ? val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }) : '-';
      
      const tableRows = productHistory.map(item => {
        // Cotação: O JSON atual não traz uma chave de identificador de Cotação relacionando aos dados de Cotações diretamente.
        // Iremos usar o nome que eventualmente carrega informações de vínculo
        const cotacaoStr = item.property_nome && item.property_nome.trim() !== '' ? item.property_nome : '-';
        
        let fornecedorNome = '-';
        if (item.property_fornecedor && item.property_fornecedor.length > 0) {
           const sup = pageState.appData.suppliers ? pageState.appData.suppliers.find(s => s.id === item.property_fornecedor[0]) : null;
           if (sup) fornecedorNome = sup.property_nome;
        }

        const valorPagoStr = formatCurrency(item.property_pre_o_da_cota_o);
        const qtdStr = item.property_quantidade != null ? item.property_quantidade : '-';
        
        // Cores de fundo baseadas na efetivação
        const efetivadoRaw = item.property_efetivado_em;
        const efetivadoValue = (efetivadoRaw && typeof efetivadoRaw === 'object') ? efetivadoRaw.start : efetivadoRaw;
        
        const rowBgClass = efetivadoValue ? 'bg-green-50' : 'bg-red-50';
        const efetivadoData = efetivadoValue ? formatDate(efetivadoValue) : '-';

        return `
          <tr class="${rowBgClass} hover:bg-opacity-70 transition-colors">
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">${formatDate(item.property_criado_em)}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700 font-medium">${efetivadoData}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${cotacaoStr}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${fornecedorNome}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-green-600">+${qtdStr}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${valorPagoStr}</td>
            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
              <a href="${item.url}" target="_blank" class="text-blue-600 hover:text-blue-900 inline-flex items-center" title="Abrir no Notion">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                </svg>
              </a>
            </td>
          </tr>
        `;
      }).join('');
      
      return `
        <div class="bg-white shadow-md rounded-lg border border-gray-200 overflow-auto">
          <h3 class="text-lg font-bold font-heading p-6" style="color: ${COLORS.black};">Histórico de Entradas</h3>
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Data de Criação</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Data de Entrada no Estoque</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Cotação</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Fornecedor</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Quantidade</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Valor Pago</th>
                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Link</th>
              </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
              ${tableRows}
            </tbody>
          </table>
        </div>
      `;
    }
    
    /**
     * Renderiza uma mensagem de erro na página
     */
    function renderPageError(message) {
      renderScreenHeader("Erro", "", ""); // Limpa cabeçalho
      const container = document.getElementById('detail-content-container');
      if (container) {
        container.innerHTML = `
          <div class="bg-white p-6 rounded-lg shadow border border-red-200 text-center">
            <h3 class="text-lg font-bold text-red-600">Ocorreu um Erro</h3>
            <p class="mt-2 text-gray-600">${message}</p>
            <a 
              href="estoque.html" 
              class="mt-6 inline-block px-4 py-2 bg-gray-200 text-gray-800 rounded-md font-medium hover:bg-gray-300 transition text-sm"
            >
              &larr; Voltar para Estoque
            </a>
          </div>
        `;
      }
    }

    // --- Inicialização ---
    init(); // Inicia a página

  </script>

</body>
</html>
