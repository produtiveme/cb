<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fornecedores - Gestão de Cotação</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Estilo Global Centralizado -->
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="flex flex-col md:flex-row min-h-screen">

    <!-- Sidebar (será preenchida pelo app.js) -->
    <div id="sidebar-container"></div>

    <!-- Conteúdo Principal -->
    <main class="flex-1 p-6 md:p-10">

      <!-- Cabeçalho (será preenchido pelo app.js) -->
      <header id="header-container"></header>

      <!-- Container para Alertas -->
      <div id="error-container" class="fixed top-5 right-5 z-50 w-full max-w-sm"></div>

      <!-- Container do Modal (inicialmente oculto) -->
      <div id="modal-container" class="hidden"></div>

      <!-- Conteúdo da Página (será preenchido pelo JS) -->
      <div id="suppliers-list-container">
        <!-- O Spinner de carregamento ou a lista de fornecedores serão injetados aqui -->
      </div>

    </main>
  </div>

  <!-- Rodapé (será preenchido pelo app.js) -->
  <div id="footer-container"></div>


  <!-- Script da Página -->
  <script type="module">
    import {
      checkAuth,
      getAppData,
      saveAppData,
      renderSidebarNav,
      renderFooter,
      renderLoading,
      renderScreenHeader,
      showError,
      showFeedback,
      showConfirmationModal,
      getItemById,
      getQuoteById,
      getProductName,
      updateQuoteItemApi, // <-- ADICIONADO
      COLORS
    } from './app.js';

    // --- Estado da Página ---
    const pageState = {
      appData: null,
      suppliers: []
    };

    // --- Funções Principais ---

    /**
     * Inicializa a página
     */
    function init() {
      // 1. Verifica autenticação
      if (!checkAuth()) return;

      // 2. Carrega dados do localStorage
      pageState.appData = getAppData();
      if (!pageState.appData) {
        showError("Falha ao carregar dados. Tente fazer login novamente.");
        return;
      }

      // 3. Pega os fornecedores
      pageState.suppliers = [...pageState.appData.suppliers].sort((a, b) =>
        a.property_nome.localeCompare(b.property_nome)
      );

      // 4. Renderiza componentes estáticos
      renderSidebarNav('fornecedores'); // Marca 'Fornecedores' como ativo
      renderFooter();
      renderScreenHeader("Fornecedores", "Consulte os fornecedores cadastrados e envie cotações pendentes.");

      // 5. Renderiza a lista de fornecedores
      renderSuppliersTable();
    }

    /**
     * Obtém itens pendentes (Status 'Criado') para um fornecedor
     */
    function getPendingItemsForSupplier(supplierId) {
      const { appData } = pageState;
      if (!appData.quoteItems) return [];

      return appData.quoteItems.filter(item =>
        item.property_fornecedor &&
        item.property_fornecedor.includes(supplierId) &&
        item.property_status === 'Criado'
      );
    }

    /**
     * Renderiza a tabela de fornecedores
     */
    function renderSuppliersTable() {
      const container = document.getElementById('suppliers-list-container');
      if (!container) return;

      renderLoading(container, "A carregar fornecedores...");

      const { suppliers } = pageState;

      // Simula um pequeno atraso para o spinner ser visível
      setTimeout(() => {
        if (suppliers.length === 0) {
          container.innerHTML = `
            <div class="bg-white p-6 rounded-lg shadow border text-center text-gray-500">
              Nenhum fornecedor encontrado.
            </div>
          `;
          return;
        }

        // Constrói as Linhas da Tabela
        const tableRows = suppliers.map(supplier => {
          // Contagem de produtos vinculados
          const productCount = (pageState.appData.productSuppliers || [])
            .filter(ps => ps.property_fornecedor && ps.property_fornecedor.includes(supplier.id))
            .length;

          // Itens pendentes para envio
          const pendingItems = getPendingItemsForSupplier(supplier.id);
          const hasPending = pendingItems.length > 0;

          return `
            <tr>
              <td class="px-6 py-4 whitespace-nowrap">
                <a href="fornecedores_detalhe.html?id=${supplier.id}" class="text-sm font-medium text-blue-600 hover:underline hover:text-blue-800 transition-colors">
                  ${supplier.property_nome}
                </a>
                ${hasPending ? `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800 mt-1 block w-max">${pendingItems.length} pendente(s)</span>` : ''}
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">${productCount} produtos vinculados</td>
              <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
                ${hasPending ? `
                  <div class="flex items-center justify-end space-x-2">
                    <button 
                      class="batch-copy-btn px-3 py-1 rounded-md bg-gray-100 text-gray-700 transition-colors hover:bg-gray-200 flex items-center space-x-1"
                      data-supplier-id="${supplier.id}"
                      title="Copiar texto para envio manual"
                    >
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                      <span>Copiar Manual</span>
                    </button>
                    <button 
                      class="batch-send-btn px-3 py-1 rounded-md text-white transition-colors hover:opacity-90 flex items-center space-x-1"
                      style="background-color: #25D366;"
                      data-supplier-id="${supplier.id}"
                      title="Enviar ${pendingItems.length} itens pendentes via WhatsApp"
                    >
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.487 5.235 3.487 8.413 0 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.451-4.437-9.887-9.888-9.888-5.451 0-9.887 4.434-9.889 9.888.001 2.228.651 4.385 1.849 6.206l-.341 1.246 1.267-.328zM9.06 8.076C8.86 7.633 8.56 7.534 8.29 7.522c-.258-.011-.532-.011-.79-.011-.315 0-.715.116-1.091.554-.42.472-.647 1.05-.67 1.121-.023.07-.442 1.134.214 2.309.615 1.09 1.575 2.158 3.48 3.868 2.16 1.916 3.326 2.486 4.36 2.977 1.537.731 2.265.628 2.91.39 1.004-.37 2.06-.213 2.06-.213s.442-.04 1.002-.685c.56-.645.56-.998.51-.998s-.442-.212-1.002-.472c-.56-.26-1.002-.37-1.122-.37-.12 0-.26 0-.37.212-.12.213-.47.561-.68.731-.21.17-.42.213-.64.09-.26-.12-.47-.213-1.002-.472-1.346-.645-2.16-1.031-2.68-1.804-.37-.645-.04-1.002.12-1.122.12-.12.26-.26.37-.37.12-.12.21-.213.3-.37.12-.17.04-.42 0-.645-.04-.213-.56-1.346-.73-1.804z"/></svg>
                      <span>Enviar WhatsApp (${pendingItems.length})</span>
                    </button>
                  </div>
                ` : ''}
                <a 
                  href="${supplier.url}" 
                  target="_blank" 
                  class="px-3 py-1 rounded-md bg-gray-200 text-gray-700 transition-colors hover:bg-gray-300 inline-block"
                  title="Abrir no Notion"
                >
                  Abrir no Notion
                </a>
              </td>
            </tr>
          `;
        }).join('');

        // Renderiza a Tabela
        container.innerHTML = `
          <div class="bg-white shadow-md rounded-lg border border-gray-200 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nome do Fornecedor</th>
                  <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Vínculos</th>
                  <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Ações</th>
                </tr>
              </thead>
              <tbody class="bg-white divide-y divide-gray-200">
                ${tableRows}
              </tbody>
            </table>
          </div>
        `;

        // Adiciona Listeners
        document.querySelectorAll('.batch-send-btn').forEach(btn => {
          btn.addEventListener('click', handleBatchSend);
        });

        document.querySelectorAll('.batch-copy-btn').forEach(btn => {
          btn.addEventListener('click', handleBatchCopy);
        });

      }, 100);
    }

    /**
     * Gera o texto da mensagem para envio em massa de pendências
     */
    function getBatchWhatsappText(supplier, pendingItems) {
      // Agrupa itens por Cotação
      const itemsByQuote = {};
      pendingItems.forEach(item => {
        const quoteIdList = item.property_cota_o || item.property_cotacao;
        const quoteId = (quoteIdList && quoteIdList.length > 0) ? quoteIdList[0] : 'unknown';

        if (!itemsByQuote[quoteId]) {
          itemsByQuote[quoteId] = [];
        }
        itemsByQuote[quoteId].push(item);
      });

      // Gera a mensagem
      let text = `Olá, ${supplier.property_nome}!\n`;
      const storeName = localStorage.getItem('N8N_DYNAMIC_STORE_NAME') || 'Curral Burguer';
      text += `Gostaria de solicitar cotação para o ${storeName}:\n\n`;

      Object.keys(itemsByQuote).forEach(quoteId => {
        const quote = getQuoteById(quoteId);
        const quoteName = quote ? quote.property_nome : '(Cotação sem ref)';

        itemsByQuote[quoteId].forEach(item => {
          let itemDescription = '';

          if (quote) {
            const productName = getProductName(quote.property_produto[0]);
            const quantidade = quote.property_quantidade || '?';
            const unidade = (quote.property_unidade_de_medida && quote.property_unidade_de_medida[0]) || '';

            itemDescription = `📦 *${productName}*\nQtd: ${quantidade} ${unidade}\n(Ref: ${quoteName})`;
          }

          text += `- ${itemDescription}\n`;
        });
        text += `\n`;
      });

      text += `Aguardo retorno. Obrigado!`;
      return text;
    }

    /**
     * Lida com a cópia do texto em massa
     */
    function handleBatchCopy(event) {
      const supplierId = event.currentTarget.dataset.supplierId;
      const supplier = pageState.suppliers.find(s => s.id === supplierId);
      if (!supplier) return;

      const pendingItems = getPendingItemsForSupplier(supplierId);
      if (pendingItems.length === 0) return;

      const text = getBatchWhatsappText(supplier, pendingItems);
      
      navigator.clipboard.writeText(text).then(() => {
        showFeedback("Texto copiado para envio manual!", "success");
      }).catch(err => {
        console.error("Erro ao copiar:", err);
        showError("Falha ao copiar texto.");
      });
    }

    /**
     * Lida com o envio em massa
     */
    function handleBatchSend(event) {
      const supplierId = event.currentTarget.dataset.supplierId;
      const supplier = pageState.suppliers.find(s => s.id === supplierId);

      if (!supplier) {
        showError("Fornecedor não encontrado.");
        return;
      }

      const pendingItems = getPendingItemsForSupplier(supplierId);
      if (pendingItems.length === 0) {
        showError("Não há itens pendentes para este fornecedor.");
        return;
      }

      // 1. Verifica telefone
      const phone = supplier.property_whats_app;
      if (!phone) {
        showError(`Fornecedor ${supplier.property_nome} não possui WhatsApp cadastrado.`);
        return;
      }
      const cleanPhone = phone.replace(/[\s\+\-\(\)]/g, '');

      // 2. Gera a mensagem
      const text = getBatchWhatsappText(supplier, pendingItems);

      // 3. Abre WhatsApp
      const encodedText = encodeURIComponent(text);
      const url = `https://wa.me/${cleanPhone}?text=${encodedText}`;
      window.open(url, '_blank');

      // 5. Pergunta se deseja marcar como enviado
      showConfirmationModal({
        title: "Confirmar Envio",
        messageHtml: `
          <p>Você enviou ${pendingItems.length} itens para o WhatsApp de <strong>${supplier.property_nome}</strong>.</p>
          <p class="mt-2 text-sm text-gray-600">Deseja marcar esses itens como <strong>"Enviado"</strong> no sistema?</p>
        `,
        confirmText: "Sim, marcar como Enviado",
        cancelText: "Não, manter como Criado",
        asyncAction: async () => {
          // Atualiza status localmente
          const { appData } = pageState;
          let updatedCount = 0;
          const updatesToDo = [];

          pendingItems.forEach(pendingItem => {
            const itemIndex = appData.quoteItems.findIndex(i => i.id === pendingItem.id);
            if (itemIndex !== -1) {
              // Atualiza local
              appData.quoteItems[itemIndex].property_status = 'Enviado Fornecedor';
              updatedCount++;

              // Prepara atualização remota
              updatesToDo.push({
                id: pendingItem.id,
                data: {
                  price: appData.quoteItems[itemIndex].property_preco || 0,
                  status: 'Enviado Fornecedor'
                }
              });
            }
          });

          saveAppData(appData);

          // Envia para o N8N Sequencialmente
          try {
            showFeedback(`Sincronizando ${updatedCount} itens...`, 'info');

            for (const update of updatesToDo) {
              await updateQuoteItemApi(update.id, update.data);
            }

            showFeedback(`${updatedCount} itens marcados como Enviado e Sincronizados!`, 'success');
          } catch (error) {
            console.error("Erro ao sincronizar envio em massa:", error);
            showFeedback("Atualizado localmente, mas houve erro na sincronização.", "warning");
          }

          // Re-renderiza a tabela
          renderSuppliersTable();
        }
      });
    }

    // --- Inicialização ---
    init(); // Inicia a página

  </script>

</body>

</html>
