<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Fornecedor - Gestão de Cotação</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Estilo Global Centralizado -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="flex flex-col md:flex-row min-h-screen">

        <!-- Sidebar (será preenchida pelo app.js) -->
        <div id="sidebar-container"></div>

        <!-- Conteúdo Principal -->
        <main class="flex-1 p-6 md:p-10">

            <!-- Cabeçalho (será preenchido pelo app.js) -->
            <header id="header-container"></header>

            <!-- Container para Alertas -->
            <div id="error-container" class="fixed top-5 right-5 z-50 w-full max-w-sm"></div>

            <!-- Conteúdo da Página (será preenchido pelo JS) -->
            <div id="supplier-detail-container">
                <!-- O Spinner de carregamento ou os detalhes serão injetados aqui -->
            </div>

        </main>
    </div>

    <!-- Rodapé (será preenchido pelo app.js) -->
    <div id="footer-container"></div>


    <!-- Script da Página -->
    <script type="module">
        import {
            checkAuth,
            getAppData,
            saveAppData,
            renderSidebarNav,
            renderFooter,
            renderScreenHeader,
            showError,
            showFeedback,
            getUrlParam,
            getQuoteById,
            getSupplierById,
            getProductName,
            updateQuoteItemApi,
            formatCurrency,
            parseCurrency,
            COLORS
        } from './app.js';

        // --- Estado da Página ---
        const pageState = {
            appData: null,
            supplierId: null,
            supplier: null
        };

        // --- Funções Principais ---

        /**
         * Inicializa a página
         */
        function init() {
            // 1. Verifica autenticação
            if (!checkAuth()) return;

            // 2. Carrega dados do localStorage
            pageState.appData = getAppData();
            if (!pageState.appData) {
                showError("Falha ao carregar dados. Tente fazer login novamente.");
                return;
            }

            // 3. Pega o ID do fornecedor da URL
            pageState.supplierId = getUrlParam('id');
            if (!pageState.supplierId) {
                showError("ID do fornecedor não fornecido.");
                renderPageError("Fornecedor não encontrado.");
                return;
            }

            // 4. Encontra o fornecedor
            pageState.supplier = getSupplierById(pageState.supplierId);
            if (!pageState.supplier) {
                showError("Fornecedor não encontrado.");
                renderPageError(`Fornecedor com ID ${pageState.supplierId} não foi encontrado.`);
                return;
            }

            // 5. Renderiza componentes estáticos
            renderSidebarNav('fornecedores');
            renderFooter();

            // 6. Renderiza a tela de detalhes
            renderSupplierDetailScreen();
        }

        /**
         * Renderiza o layout principal da tela de detalhes
         */
        function renderSupplierDetailScreen() {
            const { supplier } = pageState;
            const container = document.getElementById('supplier-detail-container');
            if (!container) return;

            // --- Botões do Cabeçalho ---
            const headerButtons = `
        <div class="flex items-center space-x-2">
          <a 
            href="fornecedores.html" 
            class="px-4 py-2 bg-gray-200 text-gray-800 rounded-md font-medium hover:bg-gray-300 transition text-sm"
          >
            &larr; Voltar
          </a>
          <a 
            href="${supplier.url}" 
            target="_blank" 
            class="px-4 py-2 text-white rounded-md font-medium transition text-sm"
            style="background-color: ${COLORS.blue};"
            title="Abrir o registo original no Notion"
          >
            Abrir no Notion
          </a>
        </div>
      `;

            // --- Subtítulo do Cabeçalho ---
            const statusColor = supplier.property_ativo ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800';
            const statusText = supplier.property_ativo ? 'Ativo' : 'Inativo';

            const subtitle = `
        <span>Status: <span class="px-2 py-0.5 text-xs font-semibold rounded-full ${statusColor}">${statusText}</span></span>
      `;

            // Renderiza Cabeçalho
            renderScreenHeader(
                `Fornecedor: ${supplier.property_nome}`,
                subtitle,
                headerButtons
            );

            // --- Renderiza Cards de Informação ---
            container.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          
          <!-- Card 1: Identificação -->
          <div class="bg-white p-6 rounded-lg shadow border border-gray-200">
            <h3 class="text-lg font-bold font-heading mb-4 border-b pb-2" style="color: ${COLORS.black};">Identificação</h3>
            <div class="space-y-3 text-sm">
              <div><span class="font-semibold text-gray-600">Razão Social:</span> <span class="text-gray-900">${supplier.property_raz_o_social || '-'}</span></div>
              <div><span class="font-semibold text-gray-600">Nome Fantasia:</span> <span class="text-gray-900">${supplier.property_nome_fantasia || '-'}</span></div>
              <div><span class="font-semibold text-gray-600">CNPJ:</span> <span class="text-gray-900">${supplier.property_cnpj || '-'}</span></div>
              <div><span class="font-semibold text-gray-600">Inscrição Estadual:</span> <span class="text-gray-900">${supplier.property_inscri_o_estadual || '-'}</span></div>
            </div>
          </div>

          <!-- Card 2: Contato -->
          <div class="bg-white p-6 rounded-lg shadow border border-gray-200">
            <h3 class="text-lg font-bold font-heading mb-4 border-b pb-2" style="color: ${COLORS.black};">Contato</h3>
            <div class="space-y-3 text-sm">
              <div><span class="font-semibold text-gray-600">Pessoa de Contato:</span> <span class="text-gray-900">${supplier.property_pessoa_de_contato || '-'}</span></div>
              <div><span class="font-semibold text-gray-600">E-mail:</span> <a href="mailto:${supplier.property_e_mail_principal}" class="text-blue-600 hover:underline">${supplier.property_e_mail_principal || '-'}</a></div>
              <div><span class="font-semibold text-gray-600">WhatsApp:</span> <span class="text-gray-900">${supplier.property_whats_app || '-'}</span></div>
              <div><span class="font-semibold text-gray-600">Telefone Fixo:</span> <span class="text-gray-900">${supplier.property_telefone_fixo || '-'}</span></div>
              <div><span class="font-semibold text-gray-600">Site:</span> <a href="${supplier.property_site}" target="_blank" class="text-blue-600 hover:underline">${supplier.property_site || '-'}</a></div>
            </div>
          </div>

          <!-- Card 3: Endereço -->
          <div class="bg-white p-6 rounded-lg shadow border border-gray-200">
            <h3 class="text-lg font-bold font-heading mb-4 border-b pb-2" style="color: ${COLORS.black};">Endereço</h3>
            <div class="space-y-3 text-sm">
              <div><span class="font-semibold text-gray-600">Logradouro:</span> <span class="text-gray-900">${supplier.property_endere_o_rua || ''}, ${supplier.property_endere_o_n_mero || ''}</span></div>
              <div><span class="font-semibold text-gray-600">Complemento:</span> <span class="text-gray-900">${supplier.property_endere_o_complemento || '-'}</span></div>
              <div><span class="font-semibold text-gray-600">Bairro:</span> <span class="text-gray-900">${supplier.property_bairro || '-'}</span></div>
              <div><span class="font-semibold text-gray-600">Cidade/UF:</span> <span class="text-gray-900">${supplier.property_cidade || ''} - ${supplier.property_estado || ''}</span></div>
              <div><span class="font-semibold text-gray-600">CEP:</span> <span class="text-gray-900">${supplier.property_cep || '-'}</span></div>
            </div>
          </div>

          <!-- Card 4: Logística -->
          <div class="bg-white p-6 rounded-lg shadow border border-gray-200">
            <h3 class="text-lg font-bold font-heading mb-4 border-b pb-2" style="color: ${COLORS.black};">Logística</h3>
            <div class="space-y-3 text-sm">
              <div><span class="font-semibold text-gray-600">Retira no Local:</span> <span class="text-gray-900">${supplier.property_retira_no_local ? 'Sim' : 'Não'}</span></div>
              <div><span class="font-semibold text-gray-600">Área de Cobertura:</span> <span class="text-gray-900">${supplier.property_rea_de_cobertura_de_entrega || '-'}</span></div>
              <div><span class="font-semibold text-gray-600">Observações:</span> <p class="text-gray-900 mt-1 whitespace-pre-line">${supplier.property_observa_es_de_contato || '-'}</p></div>
            </div>
          </div>

        </div>

        <!-- Lista de Produtos Vinculados -->
        <div class="mt-6 bg-white p-6 rounded-lg shadow border border-gray-200">
          <h3 class="text-lg font-bold font-heading mb-4 border-b pb-2" style="color: ${COLORS.black};">Produtos Vinculados</h3>
          ${renderLinkedProducts(supplier)}
        </div>
        
        <!-- Tabela de Cotações do Fornecedor -->
        <div class="mt-6 bg-white p-6 rounded-lg shadow border border-gray-200">
          <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 border-b pb-2 gap-4">
             <h3 class="text-lg font-bold font-heading" style="color: ${COLORS.black};">Cotações do Fornecedor</h3>
             <select id="quote-status-filter" class="w-full md:w-auto text-sm border-gray-300 rounded-md shadow-sm bg-white px-3 py-2 cursor-pointer focus:ring-1 focus:outline-none" style="--tw-ring-color: var(--app-accent-color);">
               <option value="all">Todas</option>
               <option value="open" selected>Em Aberto (Pendentes)</option>
               <option value="closed">Concluídas / Rejeitadas</option>
             </select>
          </div>
          <div id="supplier-quotes-container"></div>
        </div>

        <!-- Barra de Progresso de Cotação (Oculta por padrão) -->
        <div id="quote-progress-container" class="hidden fixed bottom-6 right-6 z-50 w-full max-w-sm p-4 bg-white rounded-lg shadow-2xl border border-blue-200 text-blue-800 animate-slide-up">
          <div class="flex items-center space-x-3">
            <svg class="animate-spin h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span id="quote-progress-text" class="font-medium text-sm">Processando...</span>
          </div>
        </div>
      `;
            
            // Renderiza as cotações imediatamente após injetar o innerHTML
            setTimeout(() => {
                renderSupplierQuotes(supplier.id, 'open');
                
                // Adiciona listener para o select
                const filterSelect = document.getElementById('quote-status-filter');
                if (filterSelect) {
                    filterSelect.addEventListener('change', (e) => {
                        renderSupplierQuotes(supplier.id, e.target.value);
                    });
                }
            }, 0);
        }

        /**
         * Renderiza a lista de produtos vinculados
         */
        function renderLinkedProducts(supplier) {
            const productIds = supplier.property_produto_fornecedor || [];

            if (productIds.length === 0) {
                return `<p class="text-gray-500 text-sm">Nenhum produto vinculado a este fornecedor.</p>`;
            }

            // Resolve os nomes dos produtos
            // Nota: getProductName busca pelo ID do produto. 
            // property_produto_fornecedor contém IDs de "Produto_Fornecedor" (tabela de ligação) ou IDs de "Produto"?
            // Baseado no JSON, parece ser uma lista de IDs. Vamos assumir que são IDs que podemos resolver ou que precisamos buscar na tabela de ligação.
            // Olhando o app.js, temos 'productSuppliers' (loadProductSuppliers).
            // Vamos tentar listar os nomes. Se forem IDs da tabela de ligação, precisamos achar o produto correspondente.

            // Estratégia: Listar os itens e tentar resolver o nome.
            // Se property_produto_fornecedor for uma lista de IDs da tabela intermediária, precisamos cruzar.

            const { appData } = pageState;
            const linkedProducts = [];

            productIds.forEach(linkId => {
                // Tenta achar na tabela intermediária
                const linkItem = appData.productSuppliers.find(ps => ps.id === linkId);
                if (linkItem && linkItem.property_produto && linkItem.property_produto.length > 0) {
                    const productId = linkItem.property_produto[0];
                    const productName = getProductName(productId);
                    linkedProducts.push(productName);
                }
            });

            if (linkedProducts.length === 0) {
                return `<p class="text-gray-500 text-sm">Não foi possível identificar os produtos vinculados (IDs não resolvidos).</p>`;
            }

            return `
        <ul class="list-disc list-inside text-sm text-gray-900 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2">
          ${linkedProducts.map(name => `<li>${name}</li>`).join('')}
        </ul>
      `;
        }

        /**
         * Calcula a posição competitiva de um item de cotação entre os concorrentes
         */
        function buildPriceComparison(item, quote, appData) {
            const allItemIds = quote.property_item || [];
            const allItems = allItemIds
                .map(id => appData.quoteItems.find(i => i.id === id))
                .filter(Boolean);

            const totalItems = allItems.length;
            const hasOtherUnpriced = allItems.some(i =>
                i.id !== item.id && (!i.property_preco || i.property_preco === 0)
            );
            const pricedItems = allItems.filter(i => i.property_preco > 0);

            if (!item.property_preco || item.property_preco === 0) {
                return { rank: null, pricedTotal: pricedItems.length, totalItems, hasOtherUnpriced, competitors: pricedItems.sort((a, b) => a.property_preco - b.property_preco).map(i => ({ supplierId: i.property_fornecedor?.[0], price: i.property_preco, isThis: i.id === item.id })) };
            }

            const sorted = [...pricedItems].sort((a, b) => a.property_preco - b.property_preco);
            const rank = sorted.findIndex(i => i.id === item.id) + 1;
            return {
                rank, pricedTotal: pricedItems.length, totalItems, hasOtherUnpriced,
                competitors: sorted.map(i => ({ supplierId: i.property_fornecedor?.[0], price: i.property_preco, isThis: i.id === item.id }))
            };
        }

        /**
         * Renderiza o card de resumo competitivo do fornecedor
         */
        function renderPriceSummaryCard(supplierItems, appData) {
            let lowest = 0, highest = 0, intermediate = 0, noComparison = 0;
            supplierItems.forEach(({ item, quote }) => {
                const comp = buildPriceComparison(item, quote, appData);
                if (!comp || comp.rank === null || comp.pricedTotal <= 1) { noComparison++; return; }
                if (comp.rank === 1) lowest++;
                else if (comp.rank === comp.pricedTotal) highest++;
                else intermediate++;
            });
            const withComparisons = lowest + highest + intermediate;
            if (withComparisons === 0) return '';
            return `
                <div class="mb-4 p-4 bg-white rounded-lg border border-gray-200 shadow-sm">
                    <div class="flex items-center mb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                        <h4 class="text-sm font-bold text-gray-700 ml-2">Posição Competitiva</h4>
                        <span class="ml-2 text-xs text-gray-400">(baseado nos preços informados)</span>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        ${lowest > 0 ? `<div class="px-3 py-1.5 bg-green-50 border border-green-200 rounded-full text-green-700 font-semibold text-sm">🟢 ${lowest} menor${lowest > 1 ? 'es' : ''} preço</div>` : ''}
                        ${intermediate > 0 ? `<div class="px-3 py-1.5 bg-yellow-50 border border-yellow-200 rounded-full text-yellow-700 font-semibold text-sm">🟡 ${intermediate} intermediário${intermediate > 1 ? 's' : ''}</div>` : ''}
                        ${highest > 0 ? `<div class="px-3 py-1.5 bg-red-50 border border-red-200 rounded-full text-red-600 font-semibold text-sm">🔴 ${highest} maior${highest > 1 ? 'es' : ''} preço</div>` : ''}
                        ${noComparison > 0 ? `<div class="px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-full text-gray-500 text-sm">⚪ ${noComparison} sem comparação</div>` : ''}
                    </div>
                </div>`;
        }

        /**
         * Renderiza o badge de posição inline na linha da tabela
         */
        function renderPriceBadgeHtml(comp) {
            if (!comp || comp.rank === null) return '';
            if (comp.pricedTotal <= 1) {
                return comp.hasOtherUnpriced ? `<div class="mt-1 text-xs text-amber-500">⚠️ Aguardando outros preços</div>` : '';
            }
            const rankText = comp.rank === 1
                ? `<span class="text-green-700 font-semibold">🟢 Menor preço</span>`
                : comp.rank === comp.pricedTotal
                    ? `<span class="text-red-600 font-semibold">🔴 Maior preço</span>`
                    : `<span class="text-yellow-600 font-semibold">🟡 Intermediário</span>`;
            const unpriced = comp.hasOtherUnpriced ? ` <span class="text-amber-500" title="${comp.totalItems - comp.pricedTotal} fornecedor(es) sem preço">⚠️</span>` : '';
            return `<div class="mt-1 text-xs flex items-center gap-1">${rankText} <span class="text-gray-400">· ${comp.rank}º de ${comp.pricedTotal}</span>${unpriced}</div>`;
        }

        /**
         * Renderiza a linha oculta de comparativo de preços com concorrentes
         */
        function renderCompetitorRowHtml(item, comp) {
            if (!comp || comp.competitors.length === 0) return '';
            const medals = ['🥇', '🥈', '🥉'];
            const rows = comp.competitors.map((c, idx) => {
                const medal = medals[idx] || `${idx + 1}º`;
                const name = getSupplierName(c.supplierId);
                const isThis = c.isThis;
                return `<div class="flex items-center justify-between py-1.5 px-2 rounded ${isThis ? 'bg-blue-50' : ''}">
                    <div class="flex items-center gap-2"><span>${medal}</span><span class="text-sm ${isThis ? 'font-bold text-blue-800' : 'text-gray-700'}">${name}${isThis ? ' <em class="font-normal text-xs text-blue-400">(este fornecedor)</em>' : ''}</span></div>
                    <span class="text-sm font-semibold ${isThis ? 'text-blue-700' : 'text-gray-600'}">${formatCurrency(c.price)}</span>
                </div>`;
            }).join('');
            const unpricedNote = comp.hasOtherUnpriced
                ? `<div class="mt-2 text-xs text-amber-600 bg-amber-50 rounded p-2">⚠️ ${comp.totalItems - comp.pricedTotal} fornecedor(es) desta cotação ainda não informaram o preço.</div>`
                : '';
            return `<tr id="competitor-row-${item.id}" class="hidden">
                <td colspan="6" class="px-10 py-3 bg-gray-50 border-t border-gray-100">
                    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Comparativo de Preços — ${quote.property_nome}</p>
                    <div class="max-w-md space-y-0.5">${rows}</div>
                    ${unpricedNote}
                </td>
            </tr>`;
        }

        /**
         * Renderiza as cotações do fornecedor
         */
        function renderSupplierQuotes(supplierId, filterType) {
            const { appData } = pageState;
            const container = document.getElementById('supplier-quotes-container');
            if (!container) return;

            let supplierItems = appData.quoteItems.filter(item => {
                const fornecedores = item.property_fornecedor;
                if (!fornecedores) return false;
                // Suporte a string (ID único) ou array de IDs
                if (Array.isArray(fornecedores)) return fornecedores.includes(supplierId);
                return String(fornecedores).trim() === String(supplierId).trim();
            });

            supplierItems = supplierItems.map(item => {
                // Lookup PRIMÁRIO: usa a referência da cotação que o item carrega
                const quoteIdList = item.property_cota_o || item.property_cotacao;
                let quote = null;
                if (quoteIdList && quoteIdList.length > 0) {
                    const quoteId = Array.isArray(quoteIdList) ? quoteIdList[0] : quoteIdList;
                    quote = appData.quotes.find(q => String(q.id).trim() === String(quoteId).trim());
                }
                // Fallback: busca reversa via property_item na cotação
                if (!quote) {
                    quote = appData.quotes.find(q => q.property_item && q.property_item.includes(item.id));
                }
                return { item, quote };
            }).filter(obj => obj.quote);

            if (filterType === 'open') {
                const openStatuses = ['Criado', 'Enviado Fornecedor', 'Respondido', 'Aprovado'];
                supplierItems = supplierItems.filter(obj => openStatuses.includes(obj.item.property_status));
            } else if (filterType === 'closed') {
                const closedStatuses = ['Pedido Enviado', 'Rejeitado'];
                supplierItems = supplierItems.filter(obj => closedStatuses.includes(obj.item.property_status));
            }

            if (supplierItems.length === 0) {
                container.innerHTML = `<p class="text-gray-500 text-sm py-4 text-center border rounded bg-gray-50">Nenhuma cotação encontrada para este filtro.</p>`;
                return;
            }

            // Verifica se há itens aprovados para mostrar o botão "Enviar Todos"
            const approvedItems = supplierItems.filter(obj => obj.item.property_status === 'Aprovado');

            container.innerHTML = `
                ${approvedItems.length > 0 ? `
                <div class="mb-4 flex justify-end space-x-2">
                    <button id="copy-all-orders-btn" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md font-medium hover:bg-gray-200 transition flex items-center space-x-2 shadow-sm border border-gray-200">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                        <span>Copiar Manual</span>
                    </button>
                    <button id="send-all-orders-btn" class="px-4 py-2 bg-green-600 text-white rounded-md font-medium hover:bg-green-700 transition flex items-center space-x-2 shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                        <span>Enviar WhatsApp (${approvedItems.length})</span>
                    </button>
                </div>
                ` : ''}

                <!-- Card de Posição Competitiva -->
                ${renderPriceSummaryCard(supplierItems, appData)}

                <!-- Botão Atualizar Todos os Preços -->
                <div class="mb-4 flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <span class="text-xs text-gray-500 italic">* Preencha os preços e clique no botão para salvar tudo de uma vez.</span>
                    <button id="update-all-prices-btn" class="px-4 py-2 bg-indigo-600 text-white rounded-md font-medium hover:bg-indigo-700 transition flex items-center space-x-2 shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                        <span>Atualizar todos os preços</span>
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                      <thead class="bg-gray-50">
                        <tr>
                          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Cotação / Produto</th>
                          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Qtd</th>
                          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Preço (R$)</th>
                          <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Ações</th>
                          <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Mensagem</th>
                        </tr>
                      </thead>
                      <tbody class="bg-white divide-y divide-gray-200">
                        ${supplierItems.map(obj => renderSupplierQuoteRow(obj.item, obj.quote, appData)).join('')}
                      </tbody>
                    </table>
                </div>
            `;

            addSupplierQuoteListeners();
        }

        function renderSupplierQuoteRow(item, quote, appData) {
            const status = item.property_status || 'Criado';
            const preco = item.property_preco || 0;
            const productName = getProductName(quote.property_produto[0]);
            const quantidade = quote.property_quantidade || 'N/A';
            const unidade = (quote.property_unidade_de_medida && quote.property_unidade_de_medida[0]) || '';

            let statusColor = 'bg-gray-100 text-gray-800';
            let rowBgColor = 'bg-gray-50'; // Criado

            if (status === 'Enviado Fornecedor') {
                statusColor = 'bg-blue-100 text-blue-800';
                rowBgColor = 'bg-blue-50';
            } else if (status === 'Respondido') {
                statusColor = 'bg-yellow-100 text-yellow-800';
                rowBgColor = 'bg-yellow-50';
            } else if (status === 'Aprovado') {
                statusColor = 'bg-green-100 text-green-800';
                rowBgColor = 'bg-green-50';
            } else if (status === 'Pedido Enviado') {
                statusColor = 'bg-indigo-100 text-indigo-800';
                rowBgColor = 'bg-indigo-50';
            } else if (status === 'Rejeitado') {
                statusColor = 'bg-red-100 text-red-800';
                rowBgColor = 'bg-red-50';
            }

            const canEdit = !['Aprovado', 'Rejeitado', 'Pedido Enviado'].includes(status);

            // === Comparação de preços ===
            const comp = (appData) ? buildPriceComparison(item, quote, appData) : null;
            const priceBadgeHtml = renderPriceBadgeHtml(comp);
            const hasCompetitors = comp && comp.competitors.length > 0;
            const toggleBtnHtml = hasCompetitors ? `<button class="toggle-competitors-btn mt-1 text-xs text-blue-500 hover:text-blue-700 transition-colors flex items-center gap-0.5" data-item-id="${item.id}">Ver concorrentes <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg></button>` : '';
            const competitorRowHtml = renderCompetitorRowHtml(item, comp);

            return `
              <tr class="${rowBgColor} transition-colors duration-200">
                <td class="px-4 py-4 whitespace-nowrap">
                  <div class="text-sm font-medium text-gray-900">${productName}</div>
                  <div class="text-xs text-gray-500">${quote.property_nome}</div>
                </td>
                <td class="px-4 py-4 whitespace-nowrap text-sm text-gray-900">
                  ${quantidade} ${unidade}
                </td>
                <td class="px-4 py-4 whitespace-nowrap">
                  <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${statusColor}">
                    ${status}
                  </span>
                </td>
                <td class="px-4 py-4 whitespace-nowrap">
                  <div class="flex items-center space-x-2">
                    <input 
                      type="text" 
                      class="price-input w-28 px-2 py-1 bg-white border border-gray-300 rounded-md shadow-sm text-sm focus:outline-none focus:ring-2"
                      style="--tw-ring-color: var(--app-accent-color);"
                      value="${preco === 0 ? '' : formatCurrency(preco)}"
                      placeholder="R$ 0,00"
                      data-item-id="${item.id}"
                      ${canEdit ? '' : 'disabled'}
                    >
                    ${canEdit ? `
                      <button 
                        class="save-price-btn hidden p-1 bg-green-600 text-white rounded-md hover:bg-green-700 transition-colors"
                        data-item-id="${item.id}" title="Salvar"
                      ><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg></button>
                    ` : ''}
                  </div>
                  ${priceBadgeHtml}
                  ${toggleBtnHtml}
                </td>
                <td class="px-4 py-4 whitespace-nowrap text-center text-sm font-medium space-x-2">
                  ${canEdit ? `
                    ${status === 'Criado' ? `
                      <button class="sent-btn px-2 py-1 bg-blue-100 text-blue-700 rounded-md hover:bg-blue-200 transition-colors text-xs" data-item-id="${item.id}">Enviado</button>
                    ` : ''}
                    <button class="approve-btn px-2 py-1 rounded-md text-white transition-colors text-xs" style="background-color: ${COLORS.blue};" data-item-id="${item.id}" data-quote-id="${quote.id}">Aprovar</button>
                    <button class="reject-btn px-2 py-1 bg-red-600 text-white rounded-md transition-colors text-xs" data-item-id="${item.id}" data-quote-id="${quote.id}">Rejeitar</button>
                  ` : (status === 'Aprovado' ? 
                    `<button class="send-order-btn px-2 py-1 bg-green-600 text-white rounded-md hover:bg-green-700 transition-colors text-xs" data-item-id="${item.id}" data-quote-id="${quote.id}">Enviar Pedido</button>` : 
                    (status === 'Pedido Enviado' ? '<span class="text-indigo-600 font-medium">Pedido Enviado</span>' : '<span class="text-red-600">Rejeitado</span>')
                  )}
                </td>
                <td class="px-4 py-4 whitespace-nowrap text-center text-sm font-medium space-x-2">
                  <button class="copy-text-btn p-1.5 rounded-full text-gray-500 hover:bg-gray-100 transition-colors" data-item-id="${item.id}" data-quote-id="${quote.id}"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg></button>
                  <button class="open-wpp-btn p-1.5 rounded-full text-white transition-colors" style="background-color: #25D366;" data-item-id="${item.id}" data-quote-id="${quote.id}"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.487 5.235 3.487 8.413 0 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.451-4.437-9.887-9.888-9.888-5.451 0-9.887 4.434-9.889 9.888.001 2.228.651 4.385 1.849 6.206l-.341 1.246 1.267-.328zM9.06 8.076C8.86 7.633 8.56 7.534 8.29 7.522c-.258-.011-.532-.011-.79-.011-.315 0-.715.116-1.091.554-.42.472-.647 1.05-.67 1.121-.023.07-.442 1.134.214 2.309.615 1.09 1.575 2.158 3.48 3.868 2.16 1.916 3.326 2.486 4.36 2.977 1.537.731 2.265.628 2.91.39 1.004-.37 2.06-.213 2.06-.213s.442-.04 1.002-.685c.56-.645.56-.998.51-.998s-.442-.212-1.002-.472c-.56-.26-1.002-.37-1.122-.37-.12 0-.26 0-.37.212-.12.213-.47.561-.68.731-.21.17-.42.213-.64.09-.26-.12-.47-.213-1.002-.472-1.346-.645-2.16-1.031-2.68-1.804-.37-.645-.04-1.002.12-1.122.12-.12.26-.26.37-.37.12-.12.21-.213.3-.37.12-.17.04-.42 0-.645-.04-.213-.56-1.346-.73-1.804z"/></svg></button>
                </td>
              </tr>
              ${competitorRowHtml}
            `;
        }

        function addSupplierQuoteListeners() {
            document.querySelectorAll('.price-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    handlePriceMask(e); // Aplica máscara
                    const itemId = e.target.dataset.itemId;
                    const saveBtn = document.querySelector(`.save-price-btn[data-item-id="${itemId}"]`);
                    if (saveBtn) saveBtn.classList.remove('hidden');
                });
            });

            document.querySelectorAll('.save-price-btn').forEach(btn => btn.addEventListener('click', handlePriceSaveFornecedor));
            document.querySelectorAll('.sent-btn').forEach(btn => btn.addEventListener('click', () => handleItemStatusUpdateFornecedor(btn.dataset.itemId, 'Enviado Fornecedor')));
            document.querySelectorAll('.approve-btn').forEach(btn => btn.addEventListener('click', (e) => handleItemStatusUpdateFornecedor(e.currentTarget.dataset.itemId, 'Aprovado', e.currentTarget.dataset.quoteId)));
            document.querySelectorAll('.reject-btn').forEach(btn => btn.addEventListener('click', (e) => handleItemStatusUpdateFornecedor(e.currentTarget.dataset.itemId, 'Rejeitado', e.currentTarget.dataset.quoteId)));
            document.querySelectorAll('.copy-text-btn').forEach(btn => btn.addEventListener('click', handleCopyTextFornecedor));
            document.querySelectorAll('.open-wpp-btn').forEach(btn => btn.addEventListener('click', handleOpenWhatsAppFornecedor));
            document.querySelectorAll('.send-order-btn').forEach(btn => btn.addEventListener('click', handleSendOrderIndividual));

            const sendAllBtn = document.getElementById('send-all-orders-btn');
            if (sendAllBtn) {
                sendAllBtn.addEventListener('click', handleSendAllOrders);
            }

            const copyAllBtn = document.getElementById('copy-all-orders-btn');
            if (copyAllBtn) {
                copyAllBtn.addEventListener('click', handleCopyAllOrders);
            }

            const updateAllBtn = document.getElementById('update-all-prices-btn');
            if (updateAllBtn) {
                updateAllBtn.addEventListener('click', handleUpdateAllPrices);
            }

            // Toggle de concorrentes por linha
            document.querySelectorAll('.toggle-competitors-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const itemId = e.currentTarget.dataset.itemId;
                    const row = document.getElementById(`competitor-row-${itemId}`);
                    if (!row) return;
                    const isHidden = row.classList.contains('hidden');
                    row.classList.toggle('hidden');
                    const svg = e.currentTarget.querySelector('svg');
                    e.currentTarget.innerHTML = isHidden
                        ? `Ocultar <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" /></svg>`
                        : `Ver concorrentes <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>`;
                });
            });
        }

        /**
         * Máscara de moeda em tempo real
         */
        function handlePriceMask(event) {
            let value = event.target.value;
            
            // Remove tudo que não é número
            value = value.replace(/\D/g, "");
            
            // Converte para decimal
            const options = { minimumFractionDigits: 2 };
            const result = new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(parseFloat(value) / 100);
            
            event.target.value = value ? result : "";
        }

        async function handlePriceSaveFornecedor(event) {
            const btn = event.currentTarget;
            const itemId = btn.dataset.itemId;
            const input = document.querySelector(`.price-input[data-item-id="${itemId}"]`);
            if (!input) return;

            const newPriceStr = input.value;
            const newPrice = parseCurrency(newPriceStr);
            
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-3 w-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;

            const appData = pageState.appData;
            const itemIndex = appData.quoteItems.findIndex(i => i.id === itemId);

            if (itemIndex === -1) {
                showError("Erro: Item não encontrado.");
                btn.disabled = false;
                return;
            }

            appData.quoteItems[itemIndex].property_preco = newPrice;
            if (['Criado', 'Enviado Fornecedor'].includes(appData.quoteItems[itemIndex].property_status)) {
                appData.quoteItems[itemIndex].property_status = 'Respondido';
            }

            saveAppData(appData);

            try {
                const response = await updateQuoteItemApi(itemId, { 
                    price: newPrice, 
                    status: appData.quoteItems[itemIndex].property_status 
                });
                showFeedback(response.message || response.Message || "Preço salvo e sincronizado!", "success");
            } catch (error) {
                showFeedback("Salvo localmente, mas falhou ao sincronizar.", "warning");
            } finally {
                const filterSelect = document.getElementById('quote-status-filter');
                renderSupplierQuotes(pageState.supplierId, filterSelect ? filterSelect.value : 'open');
            }
        }

        async function handleItemStatusUpdateFornecedor(itemId, newStatus, quoteId) {
            const { appData } = pageState;
            const itemIndex = appData.quoteItems.findIndex(i => i.id === itemId);
            if (itemIndex === -1) return;

            if (newStatus === 'Aprovado') {
                const price = appData.quoteItems[itemIndex].property_preco;
                if (!price || price <= 0) {
                    showError("Para aprovar, informe o PREÇO primeiro.");
                    return;
                }
            }

            appData.quoteItems[itemIndex].property_status = newStatus;
            const updatesToDo = [{
                id: itemId,
                data: { price: appData.quoteItems[itemIndex].property_preco || 0, status: newStatus }
            }];

            if (newStatus === 'Aprovado' && quoteId) {
                const quote = appData.quotes.find(q => q.id === quoteId);
                if (quote && quote.property_item) {
                    quote.property_item.forEach(otherItemId => {
                        if (otherItemId === itemId) return;
                        const otherIndex = appData.quoteItems.findIndex(i => i.id === otherItemId);
                        if (otherIndex !== -1 && ['Criado', 'Enviado Fornecedor', 'Respondido'].includes(appData.quoteItems[otherIndex].property_status)) {
                            appData.quoteItems[otherIndex].property_status = 'Rejeitado';
                            updatesToDo.push({
                                id: otherItemId,
                                data: { price: appData.quoteItems[otherIndex].property_preco || 0, status: 'Rejeitado' }
                            });
                        }
                    });
                }
            }

            saveAppData(appData);

            try {
                showFeedback("Sincronizando...", "info");
                for (const update of updatesToDo) {
                    await updateQuoteItemApi(update.id, update.data);
                }
                showFeedback("Status atualizado!", "success");
            } catch (error) {
                showFeedback("Erro na sincronização.", "warning");
            }

            const filterSelect = document.getElementById('quote-status-filter');
            renderSupplierQuotes(pageState.supplierId, filterSelect ? filterSelect.value : 'open');
        }

        function getWhatsappTextFornecedor(quote, item) {
            const productName = getProductName(quote.property_produto[0]);
            const quantidade = quote.property_quantidade || 'N/A';
            const unidade = (quote.property_unidade_de_medida && quote.property_unidade_de_medida[0]) || '';
            const supplierName = pageState.supplier.property_nome;
            let text = `Olá, ${supplierName}!\\n\\nGostaria de cotar o seguinte item para o ${localStorage.getItem('N8N_DYNAMIC_STORE_NAME') || 'Curral Burguer'}:\\n\\n*Produto:* ${productName}\\n*Quantidade:* ${quantidade} ${unidade}\\n\\nAguardo seu retorno com o valor. Obrigado!\\n\\n(Referência: ${quote.property_nome} / Item: ${item.property_nome})`;
            return text.trim().replace(/^\\s+/gm, '');
        }

        function handleCopyTextFornecedor(event) {
            const itemId = event.currentTarget.dataset.itemId;
            const quoteId = event.currentTarget.dataset.quoteId;
            const item = pageState.appData.quoteItems.find(i => i.id === itemId);
            const quote = pageState.appData.quotes.find(q => q.id === quoteId);
            if (!item || !quote) return;
            const text = getWhatsappTextFornecedor(quote, item);
            navigator.clipboard.writeText(text).then(() => showFeedback("Texto copiado!", "success"));
        }

        function handleOpenWhatsAppFornecedor(event) {
            const itemId = event.currentTarget.dataset.itemId;
            const quoteId = event.currentTarget.dataset.quoteId;
            const item = pageState.appData.quoteItems.find(i => i.id === itemId);
            const quote = pageState.appData.quotes.find(q => q.id === quoteId);
            if (!item || !quote) return;
            const phone = pageState.supplier.property_whats_app;
            if (!phone) {
                showError("Fornecedor sem WhatsApp.");
                return;
            }
            const text = encodeURIComponent(getWhatsappTextFornecedor(quote, item));
            window.open(`https://wa.me/${phone.replace(/[\\s\\+\\-\\(\\)]/g, '')}?text=${text}`, '_blank');
        }

        /**
         * Gera o texto para enviar ao WhatsApp como PEDIDO
         */
        function getPedidoWhatsappTextFornecedor(itemsWithQuotes) {
            const storeName = localStorage.getItem('N8N_DYNAMIC_STORE_NAME') || 'Curral Burguer';
            const cnpj = localStorage.getItem('N8N_DYNAMIC_STORE_CNPJ') || '';
            const today = new Date().toLocaleDateString('pt-BR');

            let text = `PEDIDO - ${storeName} - ${today}\n`;
            if (cnpj) text += `CNPJ: ${cnpj}\n`;
            text += `\n`;

            itemsWithQuotes.forEach(obj => {
                const productName = getProductName(obj.quote.property_produto[0]);
                const quantidade = obj.quote.property_quantidade || 'N/A';
                const unidade = (obj.quote.property_unidade_de_medida && obj.quote.property_unidade_de_medida[0]) || '';
                text += `${productName} - ${quantidade} ${unidade}\n`;
            });

            return text.trim();
        }

        async function handleSendOrderIndividual(event) {
            const btn = event.currentTarget;
            const itemId = btn.dataset.itemId;
            const quoteId = btn.dataset.quoteId;
            const item = pageState.appData.quoteItems.find(i => i.id === itemId);
            const quote = pageState.appData.quotes.find(q => q.id === quoteId);
            
            if (!item || !quote) return;

            // 1. Abre o WhatsApp
            const phone = pageState.supplier.property_whats_app;
            if (!phone) {
                showError("Fornecedor sem WhatsApp.");
                return;
            }
            
            const text = encodeURIComponent(getPedidoWhatsappTextFornecedor([{ item, quote }]));
            window.open(`https://wa.me/${phone.replace(/[\\s\\+\\-\\(\\)]/g, '')}?text=${text}`, '_blank');

            // 2. Atualiza status para Pedido Enviado
            await handleItemStatusUpdateFornecedor(itemId, 'Pedido Enviado', quoteId);
        }

        function handleCopyAllOrders() {
            const { appData, supplierId } = pageState;
            
            const approvedObjs = appData.quoteItems
                .filter(item => item.property_fornecedor && item.property_fornecedor.includes(supplierId) && item.property_status === 'Aprovado')
                .map(item => {
                    const quote = appData.quotes.find(q => q.property_item && q.property_item.includes(item.id));
                    return { item, quote };
                })
                .filter(obj => obj.quote);

            if (approvedObjs.length === 0) return;

            const text = getPedidoWhatsappTextFornecedor(approvedObjs);
            navigator.clipboard.writeText(text).then(() => {
                showFeedback("Texto do pedido copiado!", "success");
            });
        }

        async function handleSendAllOrders() {
            const { appData, supplierId } = pageState;
            
            // Filtra itens aprovados para este fornecedor
            const approvedObjs = appData.quoteItems
                .filter(item => item.property_fornecedor && item.property_fornecedor.includes(supplierId) && item.property_status === 'Aprovado')
                .map(item => {
                    const quote = appData.quotes.find(q => q.property_item && q.property_item.includes(item.id));
                    return { item, quote };
                })
                .filter(obj => obj.quote);

            if (approvedObjs.length === 0) {
                showFeedback("Nenhum pedido aprovado para enviar.", "info");
                return;
            }

            // 1. Abre o WhatsApp com todos os itens
            const phone = pageState.supplier.property_whats_app;
            if (!phone) {
                showError("Fornecedor sem WhatsApp.");
                return;
            }

            const text = encodeURIComponent(getPedidoWhatsappTextFornecedor(approvedObjs));
            window.open(`https://wa.me/${phone.replace(/[\\s\\+\\-\\(\\)]/g, '')}?text=${text}`, '_blank');

            // 2. Atualiza todos os itens para Pedido Enviado (Sequencialmente)
            showFeedback(`Enviando ${approvedObjs.length} pedidos...`, "info");
            
            try {
                for (const obj of approvedObjs) {
                    // Atualiza localmente
                    const idx = appData.quoteItems.findIndex(i => i.id === obj.item.id);
                    if (idx !== -1) appData.quoteItems[idx].property_status = 'Pedido Enviado';
                    
                    // Sincroniza
                    await updateQuoteItemApi(obj.item.id, { 
                        price: obj.item.property_preco || 0, 
                        status: 'Pedido Enviado' 
                    });
                }
                
                saveAppData(appData);
                showFeedback("Todos os pedidos foram marcados como enviados!", "success");
            } catch (error) {
                showFeedback("Houve um erro ao sincronizar alguns itens.", "warning");
            } finally {
                const filterSelect = document.getElementById('quote-status-filter');
                renderSupplierQuotes(supplierId, filterSelect ? filterSelect.value : 'open');
            }
        }

        async function handleUpdateAllPrices() {
            const { appData, supplierId } = pageState;
            const inputs = document.querySelectorAll('.price-input:not(:disabled)');
            const itemsToUpdate = [];

            inputs.forEach(input => {
                const itemId = input.dataset.itemId;
                const item = appData.quoteItems.find(i => i.id === itemId);
                const currentPrice = item ? item.property_preco : 0;
                const newPrice = parseCurrency(input.value);

                // Só atualiza se o preço for diferente e maior que zero
                if (newPrice > 0 && newPrice !== currentPrice) {
                    itemsToUpdate.push({
                        id: itemId,
                        price: newPrice,
                        input: input
                    });
                }
            });

            if (itemsToUpdate.length === 0) {
                showFeedback("Nenhum preço novo detectado para atualizar.", "info");
                return;
            }

            const total = itemsToUpdate.length;
            const progressContainer = document.getElementById('quote-progress-container');
            const progressText = document.getElementById('quote-progress-text');
            const updateBtn = document.getElementById('update-all-prices-btn');

            if (progressContainer) progressContainer.classList.remove('hidden');
            if (updateBtn) {
                updateBtn.disabled = true;
                updateBtn.style.opacity = '0.5';
            }

            let successCount = 0;
            let errorCount = 0;

            try {
                for (let i = 0; i < total; i++) {
                    const updateItem = itemsToUpdate[i];
                    if (progressText) progressText.innerText = `Atualizando ${i + 1} de ${total} preços...`;

                    const itemIndex = appData.quoteItems.findIndex(item => item.id === updateItem.id);
                    if (itemIndex !== -1) {
                        appData.quoteItems[itemIndex].property_preco = updateItem.price;
                        if (['Criado', 'Enviado Fornecedor'].includes(appData.quoteItems[itemIndex].property_status)) {
                            appData.quoteItems[itemIndex].property_status = 'Respondido';
                        }
                    }

                    try {
                        await updateQuoteItemApi(updateItem.id, {
                            price: updateItem.price,
                            status: appData.quoteItems[itemIndex].property_status
                        });
                        successCount++;
                    } catch (err) {
                        console.error(`Erro ao atualizar item ${updateItem.id}:`, err);
                        errorCount++;
                    }
                }

                saveAppData(appData);
                
                if (errorCount === 0) {
                    showFeedback(`${successCount} preços atualizados com sucesso!`, "success");
                } else {
                    showFeedback(`${successCount} atualizados, ${errorCount} falharam.`, "warning");
                }

            } catch (error) {
                showError("Erro durante o processamento em lote.");
            } finally {
                if (progressContainer) progressContainer.classList.add('hidden');
                if (updateBtn) {
                    updateBtn.disabled = false;
                    updateBtn.style.opacity = '1';
                }
                const filterSelect = document.getElementById('quote-status-filter');
                renderSupplierQuotes(supplierId, filterSelect ? filterSelect.value : 'open');
            }
        }

        /**
         * Renderiza uma mensagem de erro na página
         */
        function renderPageError(message) {
            renderScreenHeader("Erro", "", "");
            const container = document.getElementById('supplier-detail-container');
            if (container) {
                container.innerHTML = `
          <div class="bg-white p-6 rounded-lg shadow border border-red-200 text-center">
            <h3 class="text-lg font-bold text-red-600">Ocorreu um Erro</h3>
            <p class="mt-2 text-gray-600">${message}</p>
            <a 
              href="fornecedores.html" 
              class="mt-6 inline-block px-4 py-2 bg-gray-200 text-gray-800 rounded-md font-medium hover:bg-gray-300 transition text-sm"
            >
              &larr; Voltar para Fornecedores
            </a>
          </div>
        `;
            }
        }

        // --- Inicialização ---
        init();

    </script>

</body>

</html>
