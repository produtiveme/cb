<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque - Gestão de Cotação</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Estilo Global Centralizado -->
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="flex flex-col md:flex-row min-h-screen">

    <!-- Sidebar (será preenchida pelo app.js) -->
    <div id="sidebar-container"></div>

    <!-- Conteúdo Principal -->
    <main class="flex-1 p-6 md:p-10">

      <!-- Cabeçalho (será preenchido pelo app.js) -->
      <header id="header-container"></header>

      <!-- Container para Alertas -->
      <div id="error-container" class="fixed top-5 right-5 z-50 w-full max-w-sm"></div>

      <!-- Container do Modal (inicialmente oculto) -->
      <div id="modal-container" class="hidden"></div>

      <!-- Card de Filtros (será preenchido pelo JS) -->
      <div id="filters-container" class="mb-6"></div>

      <!-- Tabela de Produtos (será preenchida pelo JS) -->
      <div id="stock-table-container">
        <!-- O Spinner de carregamento ou a tabela serão injetados aqui -->
      </div>

    </main>
  </div>

  <!-- Rodapé (será preenchido pelo app.js) -->
  <div id="footer-container"></div>


  <!-- Script da Página -->
  <script type="module">
    import {
      checkAuth,
      getAppData,
      saveAppData,
      getProductById,
      getSupplierName,
      renderSidebarNav,
      renderFooter,
      renderLoading,
      renderScreenHeader,
      showError,
      showFeedback,
      showConfirmationModal,
      N8N_URLS,
      postApi
    } from './app.js';

    // --- Estado da Página ---
    const pageState = {
      appData: null,
      dirtyQuotes: false,
      filters: {
        name: '',
        supplier: 'all',
        category: 'all',
        status: 'all',
        stockLow: false,
        openQuotes: false,
        sort: 'alpha',
      },
      categories: [], // Lista de categorias únicas
      suppliers: [], // Lista de fornecedores para filtro
    };

    // --- Funções Principais ---

    /**
     * Inicializa a página
     */
    function init() {
      // 1. Verifica autenticação
      if (!checkAuth()) return;

      // 2. Carrega dados do localStorage
      pageState.appData = getAppData();
      if (!pageState.appData) {
        showError("Falha ao carregar dados. Tente fazer login novamente.");
        return;
      }

      // 3. Prepara dados auxiliares
      pageState.categories = extractCategories(pageState.appData.products);
      pageState.suppliers = pageState.appData.suppliers
        ? [...pageState.appData.suppliers].sort((a, b) => (a.property_nome || '').localeCompare(b.property_nome || '', 'pt-BR'))
        : [];

      // 4. Renderiza componentes estáticos
      renderSidebarNav('estoque'); // Marca 'Estoque' como ativo
      renderFooter();
      renderScreenHeader("Controlo de Estoque", "Visualize e filtre os produtos.");

      // 5. Renderiza componentes dinâmicos (filtros e tabela)
      renderFilters();
      renderStockTable();

      // 6. Adiciona listeners de eventos (só depois que os filtros existirem)
      addEventListeners();

      // Listener global para evitar perda de dados
      window.addEventListener('beforeunload', (e) => {
        if (pageState.dirtyQuotes) {
          e.preventDefault();
          e.returnValue = ''; // Exibirá um pop-up de confirmação do browser
        }
      });
    }

    /**
     * Extrai categorias únicas da lista de produtos
     */
    function extractCategories(products) {
      const allCategories = new Set();
      products.forEach(p => {
        if (p.property_categoria && Array.isArray(p.property_categoria)) {
          p.property_categoria.forEach(cat => allCategories.add(cat));
        }
      });
      return Array.from(allCategories).sort();
    }

    /**
     * Renderiza o card de filtros
     */
    function renderFilters() {
      const container = document.getElementById('filters-container');
      if (!container) return;

      const categoryOptions = pageState.categories
        .map(cat => `<option value="${cat}">${cat}</option>`)
        .join('');

      const supplierOptions = pageState.suppliers
        .map(sup => `<option value="${sup.id}">${sup.property_nome}</option>`)
        .join('');

      container.innerHTML = `
        <!-- Barra de Progresso Oculta -->
        <div id="quote-progress-container" class="hidden mb-4 p-4 rounded-lg bg-blue-50 border border-blue-200 text-blue-800 flex items-center justify-between">
          <div class="flex items-center space-x-3">
            <svg class="animate-spin h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span id="quote-progress-text" class="font-medium">Iniciando processamento...</span>
          </div>
        </div>

        <div class="bg-white p-4 rounded-lg shadow border border-gray-200">
          <div class="grid grid-cols-1 md:grid-cols-7 gap-4 items-end">
            
            <!-- Filtro Nome -->
            <div class="md:col-span-2">
              <label for="filter-name" class="block text-sm font-medium text-gray-700">Filtrar por nome</label>
              <input 
                type="text" 
                id="filter-name" 
                value="${pageState.filters.name}"
                class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2"
                style="--tw-ring-color: var(--app-accent-color);"
                placeholder="Ex: Batata Frita"
              >
            </div>

            <!-- Filtro Fornecedor -->
            <div>
              <label for="filter-supplier" class="block text-sm font-medium text-gray-700">Fornecedor</label>
              <select 
                id="filter-supplier" 
                class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2"
                style="--tw-ring-color: var(--app-accent-color);"
              >
                <option value="all">Todos</option>
                ${supplierOptions}
              </select>
            </div>

            <!-- Filtro Categoria -->
            <div>
              <label for="filter-category" class="block text-sm font-medium text-gray-700">Categoria</label>
              <select 
                id="filter-category" 
                class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2"
                style="--tw-ring-color: var(--app-accent-color);"
              >
                <option value="all">Todas</option>
                ${categoryOptions}
              </select>
            </div>





            <!-- Botão Estoque Baixo -->
            <div class="md:col-span-1">
              <button 
                id="filter-stock-low"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium transition-colors"
                style="background-color: ${pageState.filters.stockLow ? 'var(--app-accent-color)' : '#D4E7E6'}; color: ${pageState.filters.stockLow ? 'white' : '#1D1C1B'};"
              >
                Estoque Baixo
              </button>
            </div>

            <!-- Botão Cotações em Aberto -->
            <div class="md:col-span-1">
              <button 
                id="filter-open-quotes"
                class="w-full flex justify-center py-2 px-2 border border-transparent rounded-md shadow-sm text-sm font-medium transition-colors"
                style="background-color: ${pageState.filters.openQuotes ? '#FBBF24' : '#FEF3C7'}; color: ${pageState.filters.openQuotes ? '#78350F' : '#92400E'};"
                title="Filtrar apenas produtos com Cotação em Aberto"
              >
                Cotação Aberta
              </button>
            </div>

            <!-- Botão Cotar Todos -->
            <div class="md:col-span-1">
              <button 
                id="btn-cotar-todos"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium transition-colors text-white hover:opacity-90"
                style="background-color: var(--app-accent-color);"
              >
                Cotar Todos
              </button>
            </div>

          </div>
        </div>
      `;

      // Define os valores selecionados nos dropdowns
      document.getElementById('filter-supplier').value = pageState.filters.supplier;
      document.getElementById('filter-category').value = pageState.filters.category;
    }

    /**
     * Adiciona os event listeners aos filtros
     */
    function addEventListeners() {
      document.getElementById('filter-name').addEventListener('input', (e) => {
        pageState.filters.name = e.target.value;
        renderStockTable(); // Apenas renderiza a tabela, não os filtros
      });

      document.getElementById('filter-supplier').addEventListener('change', (e) => {
        pageState.filters.supplier = e.target.value;
        renderStockTable();
      });

      document.getElementById('filter-category').addEventListener('change', (e) => {
        pageState.filters.category = e.target.value;
        renderStockTable();
      });

      document.getElementById('filter-stock-low').addEventListener('click', () => {
        pageState.filters.stockLow = !pageState.filters.stockLow;
        renderFilters(); // Renderiza os filtros para atualizar a cor do botão
        renderStockTable(); // Renderiza a tabela
        addEventListeners(); // Re-adiciona os listeners
      });

      document.getElementById('filter-open-quotes').addEventListener('click', () => {
        pageState.filters.openQuotes = !pageState.filters.openQuotes;
        renderFilters();
        renderStockTable();
        addEventListeners();
      });

      const btnCotarTodos = document.getElementById('btn-cotar-todos');
      if (btnCotarTodos) {
        btnCotarTodos.addEventListener('click', handleCotarTodos);
      }
    }

    /**
     * Aplica os filtros e renderiza a tabela de estoque
     */
    function renderStockTable() {
      const container = document.getElementById('stock-table-container');
      if (!container) return;

      renderLoading(container); // Mostra o spinner

      const { products } = pageState.appData;
      const { name, supplier, category, stockLow, sort } = pageState.filters;

      // Aplica filtros
      const filteredProducts = products.filter(product => {
        const fName = name.toLowerCase();
        const pName = (product.property_nome || '').toLowerCase();

        const matchName = pName.includes(fName);

        // Filtro de fornecedor
        let matchSupplier = true;
        if (supplier !== 'all') {
          const productSuppliers = pageState.appData.productSuppliers.filter(
            ps => ps.property_produto && ps.property_produto.includes(product.id)
          );
          const supplierIds = productSuppliers.map(ps => ps.property_fornecedor && ps.property_fornecedor[0]);
          matchSupplier = supplierIds.includes(supplier);
        }

        const matchCategory = category === 'all' ||
          (product.property_categoria && product.property_categoria.includes(category));

        const matchStockLow = !stockLow ||
          (product.property_a_o_necess_ria === 'COMPRAR'); // Filtra por "Ação Necessária" = COMPRAR

        const { openQuotes } = pageState.filters;
        const hasOpenQuote = pageState.appData.quotes.some(q => 
          q.property_produto && 
          q.property_produto.includes(product.id) && 
          !['Concluído', 'Finalizada'].includes(q.property_status)
        );

        const matchOpenQuotes = !openQuotes || hasOpenQuote;

        return matchName && matchSupplier && matchCategory && matchStockLow && matchOpenQuotes;
      });

      // Aplica ordenação
      filteredProducts.sort((a, b) => {
        const nameA = (a.property_nome || '').toLowerCase();
        const nameB = (b.property_nome || '').toLowerCase();
        const stockA = a.property_estoque_atual || 0;
        const stockB = b.property_estoque_atual || 0;

        switch (sort) {
          case 'alpha':
            return nameA.localeCompare(nameB, 'pt-BR');
          case 'alpha-desc':
            return nameB.localeCompare(nameA, 'pt-BR');
          case 'stock-asc':
            if (stockA === stockB) return nameA.localeCompare(nameB, 'pt-BR');
            return stockA - stockB;
          case 'stock-desc':
            if (stockA === stockB) return nameA.localeCompare(nameB, 'pt-BR');
            return stockB - stockA;
          default:
            return 0;
        }
      });

      // Simula um pequeno atraso para o spinner ser visível
      setTimeout(() => {
        if (filteredProducts.length === 0) {
          container.innerHTML = `<div class="bg-white p-6 rounded-lg shadow border text-center text-gray-500">Nenhum produto encontrado com os filtros aplicados.</div>`;
          return;
        }

        // Constrói o HTML da Tabela
        container.innerHTML = `
          <!-- Legenda de Cores -->
          <div class="mb-3 flex flex-wrap gap-4 text-xs font-medium text-gray-600">
            <div class="flex items-center" title="Você preencheu a quantidade, pronto para Cotar Todos"><span class="w-3 h-3 rounded-full bg-orange-100 border border-orange-300 mr-2 shadow-sm"></span>Sendo Cotado Agora</div>
            <div class="flex items-center" title="Há uma cotação em aberto para este produto"><span class="w-3 h-3 rounded-full bg-yellow-100 border border-yellow-300 mr-2 shadow-sm"></span>Cotação em Aberto</div>
            <div class="flex items-center" title="Produto precisa ser comprado baseado no estoque mínimo"><span class="w-3 h-3 rounded-full bg-red-50 border border-red-200 mr-2 shadow-sm"></span>Necessário Comprar</div>
            <div class="flex items-center" title="Nenhuma ação imediata necessária"><span class="w-3 h-3 rounded-full bg-green-50 border border-green-200 mr-2 shadow-sm"></span>Estoque Mantido</div>
          </div>

          <div class="bg-white shadow-md rounded-lg border border-gray-200 overflow-auto" style="max-height: calc(100vh - 280px);">
            <table class="min-w-full divide-y divide-gray-200">
              <thead class="bg-gray-50 sticky top-0 z-10">
                <tr>
                  <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Produto</th>
                  <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Unidade</th>
                  <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Estoque Atual</th>
                  <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Estoque Ideal</th>
                  <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Comprar</th>
                  <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Ação Necessária</th>
                  <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Situação</th>
                  <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Qtde a Cotar</th>
                </tr>
              </thead>
              <tbody class="bg-white divide-y divide-gray-200">
                ${filteredProducts.map(product => renderRow(product)).join('')}
              </tbody>
            </table>
          </div>
        `;

        // Adiciona listeners aos inputs "Qtde a Cotar"
        document.querySelectorAll('.qtde-input').forEach(input => {
          input.addEventListener('input', (e) => {
            const val = parseInt(e.target.value, 10);
            const tr = e.target.closest('tr');
            if (tr) {
              if (val > 0) {
                tr.className = 'bg-orange-100 transition-colors duration-200';
              } else {
                tr.className = tr.getAttribute('data-base-bg') || '';
              }
            }

            const anyHasValue = Array.from(document.querySelectorAll('.qtde-input'))
              .some(inp => parseInt(inp.value, 10) > 0);
            pageState.dirtyQuotes = anyHasValue;
          });
        });

      }, 100); // Atraso de 100ms
    }

    /**
     * Renderiza uma linha da tabela de estoque
     */
    function renderRow(product) {
      const estoqueAtual = product.property_estoque_atual || 0;
      const estoqueIdeal = product.property_estoque_ideal || 0;
      const comprar = product.property_comprar != null ? product.property_comprar : 0;
      const acaoNecessaria = product.property_a_o_necess_ria || '';

      // Identificar fornecedores
      const productSuppliers = pageState.appData.productSuppliers.filter(
        ps => ps.property_produto && ps.property_produto.includes(product.id)
      );
      const supplierIds = productSuppliers.map(ps => ps.property_fornecedor && ps.property_fornecedor[0]);
      const uniqueSupplierIds = [...new Set(supplierIds)].filter(id => id); // Remove undefined/null
      const nomesFornecedores = uniqueSupplierIds.map(id => getSupplierName(id));
      
      // Ordena alfabeticamente os fornecedores
      nomesFornecedores.sort((a, b) => a.localeCompare(b, 'pt-BR'));

      let fornecedoresHtml = '';
      if (nomesFornecedores.length > 0) {
        const top3 = nomesFornecedores.slice(0, 3);
        const restante = nomesFornecedores.length - 3;
        
        fornecedoresHtml = top3.map(n => `<div class="text-xs text-gray-500 mt-1 truncate max-w-[220px]" title="${n}">• ${n}</div>`).join('');
        
        if (restante > 0) {
          fornecedoresHtml += `<div class="text-xs text-gray-400 mt-1 font-medium italic">+ ${restante} outro(s)</div>`;
        }
      } else {
        fornecedoresHtml = `<div class="text-xs text-gray-400 mt-1 italic">Sem fornecedor cadastrado</div>`;
      }

      // Formata porcentagem: 1 = 100%, 0.25 = 25%
      const formatPct = (val) => val != null ? (val * 100).toFixed(0) + '%' : 'N/A';

      // Define a cor do texto do estoque atual
      const isComprar = acaoNecessaria === 'COMPRAR';
      const stockColorClass = isComprar ? 'text-red-600 font-bold' : 'text-gray-900';

      // Badge Ação Necessária
      const acaoBg = isComprar ? 'background-color:#FEE2E2; color:#991B1B;' : 'background-color:#D1FAE5; color:#065F46;';

      // Badge Situação
      const hasOpenQuote = pageState.appData.quotes.some(q => 
        q.property_produto && 
        q.property_produto.includes(product.id) && 
        !['Concluído', 'Finalizada'].includes(q.property_status)
      );

      const status = hasOpenQuote ? 'Pendente' : 'Efetuado';
      const statusColorClass = hasOpenQuote ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800';

      let rowBgClass = '';
      if (hasOpenQuote) {
        rowBgClass = 'bg-yellow-100 hover:bg-yellow-200 transition-colors duration-200';
      } else if (acaoNecessaria === 'COMPRAR') {
        rowBgClass = 'bg-red-50 hover:bg-red-100 transition-colors duration-200';
      } else if (acaoNecessaria === 'MANTIDO') {
        rowBgClass = 'bg-green-50 hover:bg-green-100 transition-colors duration-200';
      } else {
        rowBgClass = 'hover:bg-gray-50 transition-colors duration-200'; // Default
      }

      return `
        <tr id="row-${product.id}" class="${rowBgClass}" data-base-bg="${rowBgClass}">
          <!-- Nome do Produto (Link) -->
          <td class="px-6 py-4 whitespace-nowrap">
            <div class="flex flex-col">
              <a 
                href="estoque_detalhe.html?id=${product.id}" 
                class="text-sm font-medium hover:underline"
                style="color: var(--app-accent-color);"
                title="Ver histórico e detalhes"
              >
                ${product.property_nome}
              </a>
              <div class="mt-1">
                ${fornecedoresHtml}
              </div>
            </div>
          </td>

          <!-- Unidade -->
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
            ${product.property_unidade_de_medida || 'N/A'}
          </td>

          <!-- Estoque Atual -->
          <td class="px-6 py-4 whitespace-nowrap">
            <span class="text-sm ${stockColorClass}">${estoqueAtual}</span>
          </td>

          <!-- Estoque Ideal -->
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
            ${estoqueIdeal}
          </td>

          <!-- Comprar -->
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
            ${comprar}
          </td>

          <!-- Ação Necessária -->
          <td class="px-6 py-4 whitespace-nowrap">
            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full" style="${acaoBg}">
              ${acaoNecessaria || 'N/A'}
            </span>
          </td>

          <!-- Situação -->
          <td class="px-6 py-4 whitespace-nowrap">
            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${statusColorClass}">
              ${status}
            </span>
          </td>

          <!-- Qtde a Cotar -->
          <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
            <input 
              type="number" 
              min="0"
              class="qtde-input block w-24 ml-auto px-2 py-1 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2"
              style="--tw-ring-color: var(--app-accent-color);"
              placeholder="0"
              data-id="${product.id}"
            >
          </td>
        </tr>
      `;
    }

    /**
     * Lida com o processamento do lote de cotações
     */
    async function handleCotarTodos() {
      const { appData } = pageState;

      // 1. Busca todos os inputs preenchidos com qtde > 0
      const inputs = document.querySelectorAll('.qtde-input');
      const itemsToQuote = [];
      
      inputs.forEach(input => {
        const qty = parseInt(input.value, 10);
        if (!isNaN(qty) && qty > 0) {
          itemsToQuote.push({
            productId: input.dataset.id,
            quantity: qty,
            inputElement: input
          });
        }
      });

      if (itemsToQuote.length === 0) {
        showError("Preencha a quantidade a cotar de pelo menos um produto na tabela.");
        return;
      }

      // 2. Prepara validações base
      const validItems = [];
      const validationErrors = [];

      for (const item of itemsToQuote) {
        const product = getProductById(item.productId);
        if (!product) continue;

        const openQuote = appData.quotes.find(q =>
          q.property_produto &&
          q.property_produto.includes(item.productId) &&
          !['Concluído', 'Finalizada'].includes(q.property_status)
        );

        if (openQuote) {
          validationErrors.push(`O produto ${product.property_nome} já possui cotação aberta (${openQuote.property_nome}).`);
          continue; // Ignora este item, mas não para o processo total
        }

        const productSuppliers = appData.productSuppliers.filter(
          ps => ps.property_produto.includes(item.productId)
        );
        const supplierIds = productSuppliers.map(ps => ps.property_fornecedor && ps.property_fornecedor[0]).filter(id => id);
        const uniqueSupplierIds = [...new Set(supplierIds)];

        if (uniqueSupplierIds.length === 0) {
          validationErrors.push(`O produto ${product.property_nome} não possui fornecedores cadastrados.`);
          continue;
        }

        validItems.push({
          ...item,
          product,
          uniqueSupplierIds
        });
      }

      if (validationErrors.length > 0) {
        // Se houver erros, exibimos mas deixamos seguir com os válidos caso existam
        showError("Atenção: Alguns itens não podem ser cotados e foram ignorados:\n- " + validationErrors.join("\n- "));
        if (validItems.length === 0) return;
      }

      // 3. Confirmar a Ação
      const messageHtml = `
        <p>Você selecionou <strong>${validItems.length}</strong> produto(s) para cotar.</p>
        <p class="text-sm text-gray-500 mt-2">Deseja prosseguir com a criação das cotações no sistema?</p>
      `;

      showConfirmationModal({
        title: "Confirmar Criação em Lote",
        messageHtml: messageHtml,
        confirmText: "Iniciar Processamento",
        cancelText: "Cancelar",
        asyncAction: () => {
          
          const totalItems = validItems.length;
          const progressContainer = document.getElementById('quote-progress-container');
          const progressText = document.getElementById('quote-progress-text');
          const btnCotarTodos = document.getElementById('btn-cotar-todos');
          
          if (progressContainer) progressContainer.classList.remove('hidden');
          if (btnCotarTodos) {
            btnCotarTodos.disabled = true;
            btnCotarTodos.style.opacity = '0.5';
          }

          // Executa em background para que o modal possa fechar imediatamente
          (async () => {
            let successCount = 0;
            let errorCount = 0;

            // 4. Processar cada produto
            for (let i = 0; i < totalItems; i++) {
              const item = validItems[i];
              progressText.innerText = `Processando ${i + 1} de ${totalItems} cotações...`;

              const unidadeMedida = item.product.property_unidade_de_medida || 'Unidade';

              const lastQuote = appData.quotes.length > 0 ?
                appData.quotes.reduce((a, b) => {
                  const numA = parseInt(a.property_nome.split('-')[1]) || 0;
                  const numB = parseInt(b.property_nome.split('-')[1]) || 0;
                  return numA > numB ? a : b;
                }) : { property_nome: 'COT-0' };

              const lastQuoteNum = parseInt(lastQuote.property_nome.split('-')[1]) || 0;
              const newQuoteNum = (lastQuoteNum + 1).toString().padStart(3, '0');
              const newQuoteName = `COT-${newQuoteNum}`;

              const newQuoteId = crypto.randomUUID();

              const newQuote = {
                id: newQuoteId,
                property_nome: newQuoteName,
                property_status: "Rascunho",
                property_produto: [item.productId],
                property_quantidade: item.quantity,
                property_unidade_de_medida: [unidadeMedida],
                property_item: [],
                url: "#"
              };

              const newItems = [];
              let lastItemNum = appData.quoteItems.length > 0 ?
                appData.quoteItems.reduce((a, b) => {
                  const numA = parseInt(a.property_nome) || 0;
                  const numB = parseInt(b.property_nome) || 0;
                  return numA > numB ? a : b;
                }) : { property_nome: '0' };

              let currentItemNum = parseInt(lastItemNum.property_nome || '0', 10);

              for (const supplierId of item.uniqueSupplierIds) {
                currentItemNum++;
                const newItemId = crypto.randomUUID();
                const newItem = {
                  id: newItemId,
                  property_nome: currentItemNum.toString().padStart(3, '0'),
                  property_status: "Criado",
                  property_fornecedor: [supplierId],
                  property_cota_o: [newQuoteId],
                  property_preco: 0,
                  url: "#"
                };
                newItems.push(newItem);
                newQuote.property_item.push(newItemId);
              }

              const payload = {
                cotacao: {
                  property_nome: newQuote.property_nome,
                  property_status: newQuote.property_status,
                  property_produto: newQuote.property_produto,
                  property_quantidade: newQuote.property_quantidade,
                  property_unidade_de_medida: newQuote.property_unidade_de_medida,
                  id_local: newQuote.id
                },
                itens: newItems.map(it => ({
                  property_nome: it.property_nome,
                  property_status: it.property_status,
                  property_fornecedor: it.property_fornecedor,
                  property_preco: it.property_preco,
                  id_local: it.id
                }))
              };

              try {
                await postApi(N8N_URLS.createQuote, payload);
                // Sucesso no N8N
                appData.quotes.push(newQuote);
                appData.quoteItems.push(...newItems);
                
                item.inputElement.value = ''; // Limpa em caso de sucesso
                
                // Re-avalia o status de dirtyQuotes após cada sucesso para o navegador saber se pode sair
                pageState.dirtyQuotes = Array.from(document.querySelectorAll('.qtde-input'))
                  .some(inp => parseInt(inp.value, 10) > 0);

                successCount++;
              } catch (error) {
                errorCount++;
                showError(`Falha ao processar cotação para ${item.product.property_nome}: ${error.message}`);
                // Não limpar o input de qtde para o usuário poder tentar novamente
              }
            }

            saveAppData(appData);

            // 5. Finalizar processamento
            if (progressContainer) progressContainer.classList.add('hidden');
            if (btnCotarTodos) {
              btnCotarTodos.disabled = false;
              btnCotarTodos.style.opacity = '1';
            }
            
            if (successCount > 0 && errorCount === 0) {
              let redirect = confirm(`Sucesso! ${successCount} cotação(ões) processada(s) corretamente. Deseja ir para a tela de Cotações agora?`);
              if (redirect) {
                window.location.href = 'cotacoes.html';
              }
            } else if (successCount > 0 && errorCount > 0) {
              showError(`Cotações parcialmente processadas. ${successCount} originadas, mas ${errorCount} falharam. Os itens que falharam ainda estão preenchidos na tabela.`);
            } else if (successCount === 0 && errorCount > 0) {
              showError("Falha na criação de todas as cotações desejadas. Tente novamente mais tarde.");
            }
          })();
        }
      });
    }

    // --- Inicialização ---
    init(); // Inicia a página

  </script>

</body>

</html>
